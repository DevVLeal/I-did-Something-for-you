<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uma coisinha pra Eduarda</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:url("sunset bedroom.jpg") center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

.container{
    position:relative;
    z-index:5;
    width:92%;
    max-width:700px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(10px);
    border-radius:24px;
    padding:30px;
    text-align:center;
    color:white;
    box-shadow:0 0 25px rgba(0,0,0,0.25);
}

img{
    width:100%;
    max-height:380px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:20px;
}

h2{
    font-size:1.8rem;
    margin-bottom:25px;
    text-shadow:2px 2px 8px black;
}

.botoes{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:14px 24px;
    border-radius:30px;
    cursor:pointer;
    font-size:1rem;
    transition:0.3s;
}

.avancar{
    background:#ff4d6d;
    color:white;
}

.avancar:hover{
    background:#ff1e4f;
}

.desistir{
    background:#ffffff;
    color:#333;
}

.desistir:hover{
    transform:scale(1.05);
}

video{
    width:100%;
    border-radius:20px;
}

.petala,.chuva{
    position:fixed;
    top:-30px;
    z-index:20;
    pointer-events:none;
}

.petala{
    animation:cair linear forwards;
}

.chuva{
    width:2px;
    height:20px;
    background:rgba(180,220,255,0.8);
    animation:chover linear forwards;
}

@keyframes cair{
    0%{transform:translateY(0) rotate(0deg); opacity:1;}
    100%{transform:translateY(110vh) rotate(360deg); opacity:0.8;}
}

@keyframes chover{
    0%{transform:translateY(0);}
    100%{transform:translateY(110vh);}
}

@media(max-width:700px){
    h2{font-size:1.35rem;}
}
</style>
</head>

<body>

<!-- Música de fundo -->
<audio id="bgm" loop>
    <source src="linger.mp3" type="audio/mp3">
</audio>

<div class="overlay"></div>

<div class="container">

    <div id="conteudo">
        <img id="imagem" src="https://uploads.onecompiler.io/44kft44hw/44kgbcaf3/ec394d1be953e7bf4a531ef289c4cfee.jpg">
        <h2 id="texto">Tava terminando de jantar tranquilamente...</h2>

        <div class="botoes">
            <button class="avancar" onclick="proximo()">Avançar ➡️​</button>
            <button class="desistir" onclick="desistir()">Desistir de ver 😔</button>
        </div>
    </div>

</div>

<script>
let etapa = 0;

/* inicia música no primeiro clique */
document.body.addEventListener("click", function(){

    let musica = document.getElementById("bgm");
    musica.volume = 0.15; /* volume baixo */
    musica.play();

}, {once:true});

const cenas = [
{
img:"https://uploads.onecompiler.io/44kft44hw/44kgbcaf3/ec394d1be953e7bf4a531ef289c4cfee.jpg",
texto:"Tava terminando de jantar tranquilamente..."
},
{
img:"https://uploads.onecompiler.io/44kft44hw/44kgbcaf3/4c2d9373e2dd1621db9b78cd1f400bdb.jpg",
texto:"Tava vendo umas coisas no pc e pensei..."
},
{
img:"https://uploads.onecompiler.io/44kft44hw/44kgbcaf3/5385e3343d346954c265135b13a725dd.jpg",
texto:"E se eu fizesse uma coisinha pra ela?"
},
{
img:"https://uploads.onecompiler.io/44kft44hw/44kgbcaf3/9571f9dae1cd0def9390c7443a83d1e2.jpg",
texto:"Queria ver o que eu fiz?"
},
{
img:"https://uploads.onecompiler.io/44kft44hw/44kgbcaf3/Shy%20kitty.jpg",
texto:"Tu quer ver mesmo?... tô com vergonha."
}
];

function proximo(){

    etapa++;

    if(etapa < cenas.length){
        document.getElementById("imagem").src = cenas[etapa].img;
        document.getElementById("texto").innerHTML = cenas[etapa].texto;
    }
    else{
        mostrarVideo();
    }
}

function mostrarVideo(){

    /* para música quando vídeo começa */
    let musica = document.getElementById("bgm");
    musica.pause();
    musica.currentTime = 0;

    document.getElementById("conteudo").innerHTML = `
    <video autoplay controls>
        <source src="cat dancing.mp4" type="video/mp4">
    </video>

    <h2 style="margin-top:20px;">Trouxe isso pra você 🌹</h2>
    `;

    setInterval(criarPetala,250);
}

function desistir(){

document.getElementById("conteudo").innerHTML = `
<img src="https://uploads.onecompiler.io/44kft44hw/44kgbcaf3/Sad%20cat.jpg">
<h2>poxa... fica pra outra hora então 😿</h2>
`;

setInterval(criarChuva,120);

}

function criarPetala(){

let p = document.createElement("div");
p.classList.add("petala");
p.innerHTML="🌸";

p.style.left=Math.random()*100+"vw";
p.style.fontSize=(18+Math.random()*16)+"px";
p.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(p);

setTimeout(()=>{p.remove()},7000);
}

function criarChuva(){

let c = document.createElement("div");
c.classList.add("chuva");

c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(0.7+Math.random())+"s";

document.body.appendChild(c);

setTimeout(()=>{c.remove()},2000);
}
</script>

</body>
</html>
